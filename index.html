<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حفل تخرج الدفعة الثانية عشرة 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:'Tajawal','Cairo',Arial,sans-serif;
background:linear-gradient(160deg,#0f0520 0%,#1a0a3d 30%,#2d1060 60%,#1a0a3d 100%);
min-height:100vh; color:#f3e8ff; direction:rtl; overflow-x:hidden;
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(192,132,252,0.3);border-radius:4px}
input::placeholder{color:rgba(196,181,253,0.4)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.15)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.card{animation:fadeUp .55s ease both}
.glow-border{border:1px solid rgba(192,132,252,0.25);box-shadow:0 0 20px rgba(139,92,246,0.08),inset 0 1px 0 rgba(255,255,255,0.05)}
.header{position:sticky;top:0;z-index:50;background:rgba(15,5,32,0.9);backdrop-filter:blur(24px);border-bottom:1px solid rgba(139,92,246,0.2);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.header-icon{width:46px;height:46px;border-radius:13px;flex-shrink:0;background:linear-gradient(135deg,#6d28d9,#a855f7,#ec4899);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(139,92,246,0.5);}
.header-title{font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;background:linear-gradient(90deg,#e2c4ff,#f0abfc,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3;}
.header-sub{font-size:11px;color:rgba(196,181,253,0.6);margin-top:2px}
.live-badge{display:flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(134,239,172,0.08);border:1px solid rgba(134,239,172,0.2);border-radius:20px;font-size:12px;color:#86efac;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#86efac;animation:pulse 2s infinite}
.main{padding:16px 14px 40px;max-width:680px;margin:0 auto}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.spinner{width:40px;height:40px;border:3px solid rgba(139,92,246,0.2);border-top-color:#a855f7;border-radius:50%;animation:spin 0.8s linear infinite}
.loading-text{color:rgba(196,181,253,0.6);font-size:14px}
.error-box{background:rgba(252,165,165,0.08);border:1px solid rgba(252,165,165,0.25);border-radius:16px;padding:20px;text-align:center;color:#fca5a5;font-size:13px;margin:20px 0}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi-card{background:rgba(255,255,255,0.04);border-radius:16px;padding:15px 14px 13px;position:relative;overflow:hidden;animation:fadeUp .55s ease both;}
.kpi-label{font-size:10px;color:#ffffff;margin-bottom:5px;letter-spacing:0.6px;text-transform:uppercase}
.kpi-value{font-family:'Cairo',sans-serif;font-size:34px;font-weight:800;line-height:1}
.kpi-sub{font-size:11px;color:rgba(196,181,253,0.45);margin-top:5px}
.kpi-icon{position:absolute;top:12px;left:12px;font-size:17px;opacity:0.35}
.kpi-accent{position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 16px 0 60px;opacity:0.08}
.kpi-full{grid-column:span 2}
.panel{background:rgba(255,255,255,0.03);border-radius:18px;margin-bottom:14px;overflow:hidden;animation:fadeUp .55s ease both;}
.panel-header{padding:14px 16px 12px;border-bottom:1px solid rgba(139,92,246,0.15);display:flex;align-items:center;justify-content:space-between;}
.section-title{font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.section-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.panel-body{padding:16px}
.count-badge{font-size:11px;padding:2px 10px;border-radius:20px;background:rgba(134,239,172,0.1);color:#86efac;border:1px solid rgba(134,239,172,0.25);}
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.legend-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.legend-item:last-child{border:none}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.legend-name{font-size:12px;color:rgba(243,232,255,0.8)}
.legend-val{font-family:'Cairo',sans-serif;font-size:14px;font-weight:700}
.legend-left{display:flex;align-items:center;gap:8px}
.bar-list{display:flex;flex-direction:column;gap:13px}
.bar-row{display:flex;justify-content:space-between;margin-bottom:5px}
.bar-name{font-size:12px;color:rgba(196,181,253,0.7)}
.bar-val{font-size:13px;font-weight:700;font-family:'Cairo',sans-serif}
.bar-track{height:8px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:10px;transition:width 1.2s ease}
.gauge-row{display:flex;justify-content:space-between;margin-bottom:7px}
.gauge-label{font-size:12px;color:rgba(196,181,253,0.55)}
.gauge-val{font-family:'Cairo',sans-serif;font-size:16px;font-weight:800;color:#86efac}
.gauge-track{height:10px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.gauge-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#6d28d9,#a855f7,#86efac);box-shadow:0 0 10px rgba(168,85,247,0.5)}
.gauge-ends{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:rgba(196,181,253,0.3)}
.divider{margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.05)}
.search-wrap{padding:10px 14px;border-bottom:1px solid rgba(139,92,246,0.08)}
.search-box{display:flex;align-items:center;gap:8px;background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);border-radius:12px;padding:8px 12px;}
.search-box input{background:none;border:none;outline:none;color:#f3e8ff;font-size:13px;width:100%;direction:rtl;font-family:'Tajawal',sans-serif;}
.filters{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid rgba(139,92,246,0.08);overflow-x:auto}
.filter-btn{padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:'Tajawal',sans-serif;border:1px solid rgba(139,92,246,0.15);background:rgba(255,255,255,0.03);color:rgba(196,181,253,0.55);transition:all .2s;}
.filter-btn.active{border-color:rgba(192,132,252,0.6);background:rgba(139,92,246,0.2);color:#e2c4ff;}
.guest-list{max-height:380px;overflow-y:auto}
.guest-item{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;gap:10px;border-bottom:1px solid rgba(139,92,246,0.07);}
.guest-item:nth-child(even){background:rgba(139,92,246,0.03)}
.guest-name{font-size:13px;font-weight:600;color:#f3e8ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guest-title{font-size:11px;color:rgba(196,181,253,0.5);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guest-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.cat-tag{font-size:10px;padding:2px 7px;border-radius:6px}
.status-tag{font-size:10px;padding:2px 8px;border-radius:20px}
.list-footer{padding:8px 16px;border-top:1px solid rgba(139,92,246,0.1);font-size:11px;color:rgba(196,181,253,0.35);text-align:center}
.empty{text-align:center;padding:32px;color:rgba(196,181,253,0.35);font-size:13px}
.refresh-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.25);border-radius:20px;font-size:11px;color:#c4b5fd;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;}
.refresh-btn:hover{background:rgba(139,92,246,0.2)}
.last-updated{font-size:10px;color:rgba(196,181,253,0.35);text-align:center;padding:8px;margin-top:-8px}
</style>
</head>
<body>
<div class="header">
<div style="display:flex;align-items:center;gap:12px">
<div class="header-icon">🎓</div>
<div>
<div class="header-title">حفل تخرج الدفعة الثانية عشرة</div>
<div class="header-sub">جامعة سليمان الراجحي · 2026</div>
</div>
</div>
<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
<button class="refresh-btn" onclick="loadData()">🔄 تحديث</button>
<div class="live-badge"><span class="live-dot"></span>مباشر</div>
</div>
</div>
<div class="main" id="mainContent">
<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">جارٍ تحميل البيانات...</div></div>
</div>
<script>
const SUPABASE_URL="https://gcozxvxetrqzgmzlooig.supabase.co";
const SUPABASE_KEY="sb_publishable_zj0ZYk7O4zEFHFuqrcHm-A_uvv_Cs8B";
const TABLE_NAME="GraduattionDashboard";
const COL_NAME="اسم المدعو";
const COL_TITLE="المنصب";
const COL_STATUS="حالة الحضور";
const CATEGORY_MAP={"مجلس النظارة":["إبراهيم بن سليمان الراجحي","فواز بن سليمان الراجحي","صالح بن حميد","خالد الراجحي","محمد بن عبدالرحمن الراجحي","رائد بن ناصر الريس","خالد بن صالح السلطان","تركي اليحيى","أحمد الحقباني","عبدالعزيز بن عمر الراجحي","منصور الغامدي"],"الوقف والقابضة":["عمر بن عبدالرحمن الحسين","عبدالعزيز بن محمد الناصر","مسعود بن محمد القحطاني","علي بن أحمد الرشود","ايمن بن محمد فلاته","أحمد بن عوضه الزهراني","باسم بن منصور المالك","سليمان بن محمد القهيدان","إحسان بافقيه","رامي بامهيل","هيثم الفايز","ماجد العصيمي"],"مجلس الأمناء":["عبدالعزيز بن إبراهيم الراجحي","عمر بن عبدالله السويلم","علي بن إبراهيم النملة","محمد بن يحيى الشهري","عبدالواحد بن حمد المزروع","إبراهيم بن علي العريني","فيصل بن عبدالرحمن الزهراني","بسام بن محمد البسام","بندر بن عبدالرحمن بن مقرن","أحمد بن حسن مفتي"],"الشركات الشقيقة":["إبراهيم بن علي المحسن","منير بن خالد الحميد","محمد بن سريع السريع","عبدالرحمن بن عبدالمحسن الخلف","محمد بن حمد الخميس","عبد الحكيم بن صالح الداوود","ضيف الله بن خالد الحربي","أيمن بن إبراهيم المزروع","عبدالرحمن بن سليمان الراجحي","خالد الحليبي"],"الدوائر الحكومية":[]};
function detectCategory(name){if(!name)return"الدوائر الحكومية";for(const[cat,keywords]of Object.entries(CATEGORY_MAP)){if(cat==="الدوائر الحكومية")continue;for(const kw of keywords){if(name.includes(kw))return cat;}}return"الدوائر الحكومية";}
function normalizeStatus(val){if(!val)return"pending";const v=val.toString().trim();if(["confirmed","مؤكد","حضور","نعم","✓"].includes(v))return"confirmed";if(["excused","معتذر","اعتذر","لا","✗"].includes(v))return"excused";return"pending";}
const CATS=["مجلس النظارة","الوقف والقابضة","مجلس الأمناء","الشركات الشقيقة","الدوائر الحكومية"];
const COLORS={"مجلس النظارة":{text:"#e2c4ff",bar:"#c084fc"},"الوقف والقابضة":{text:"#93c5fd",bar:"#60a5fa"},"مجلس الأمناء":{text:"#f0abfc",bar:"#e879f9"},"الشركات الشقيقة":{text:"#fca5e0",bar:"#f472b6"},"الدوائر الحكومية":{text:"#a5f3fc",bar:"#22d3ee"}};
const STATUS={confirmed:{bg:"rgba(134,239,172,0.15)",text:"#86efac",border:"rgba(134,239,172,0.3)",label:"✓ مؤكد"},excused:{bg:"rgba(252,165,165,0.12)",text:"#fca5a5",border:"rgba(252,165,165,0.3)",label:"✗ معتذر"},pending:{bg:"rgba(255,255,255,0.06)",text:"#c4b5fd",border:"rgba(196,181,253,0.2)",label:"⏳ انتظار"}};
let guests=[],currentFilter="all";
async function loadData(){
const main=document.getElementById("mainContent");
main.innerHTML='<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">جارٍ تحميل البيانات...</div></div>';
try{
const url=`${SUPABASE_URL}/rest/v1/${encodeURIComponent(TABLE_NAME)}?select=*`;
const res=await fetch(url,{headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"}});
if(!res.ok){const err=await res.text();throw new Error(`خطأ ${res.status}: ${err}`);}
const raw=await res.json();
guests=raw.map(row=>({name:row[COL_NAME]||"",title:row[COL_TITLE]||"",status:normalizeStatus(row[COL_STATUS]),cat:detectCategory(row[COL_NAME]||"")}));
renderDashboard();
}catch(e){
main.innerHTML=`<div class="error-box">⚠️ تعذّر تحميل البيانات<br><small style="opacity:0.7;margin-top:6px;display:block">${e.message}</small><button onclick="loadData()" class="refresh-btn" style="margin:12px auto 0;display:flex">🔄 إعادة المحاولة</button></div>`;
}
}
function renderDashboard(){
const total=guests.length,confirmed=guests.filter(g=>g.status==="confirmed").length,excused=guests.filter(g=>g.status==="excused").length,pending=guests.filter(g=>g.status==="pending").length,pct=total?((confirmed/total)*100).toFixed(1):"0.0";
const catTotals=Object.fromEntries(CATS.map(c=>[c,guests.filter(g=>g.cat===c).length]));
const catConfirmed=Object.fromEntries(CATS.map(c=>[c,guests.filter(g=>g.cat===c&&g.status==="confirmed").length]));
const now=new Date().toLocaleString("ar-SA",{hour:"2-digit",minute:"2-digit",day:"numeric",month:"short"});
const main=document.getElementById("mainContent");
main.innerHTML=`<div class="kpi-grid" id="kpiGrid"></div><div class="panel glow-border" style="animation-delay:0.38s"><div class="panel-header"><div class="section-title"><span class="section-dot" style="background:#c084fc;box-shadow:0 0 8px #c084fc"></span>توزيع المدعوين حسب الفئة</div></div><div class="panel-body"><div class="donut-wrap"><svg id="donutSvg" width="136" height="136" viewBox="0 0 136 136" style="flex-shrink:0;filter:drop-shadow(0 0 16px rgba(139,92,246,0.3))"></svg><div style="flex:1;min-width:160px" id="legend"></div></div></div></div><div class="panel glow-border" style="animation-delay:0.45s"><div class="panel-header"><div class="section-title"><span class="section-dot" style="background:#86efac;box-shadow:0 0 8px #86efac"></span>التأكيدات حسب الفئة</div><span class="count-badge">${confirmed} مؤكد</span></div><div class="panel-body"><div class="bar-list" id="barList"></div><div class="divider"><div class="gauge-row"><span class="gauge-label">نسبة التأكيد الإجمالية</span><span class="gauge-val">${pct}%</span></div><div class="gauge-track"><div class="gauge-fill" style="width:${pct}%"></div></div><div class="gauge-ends"><span>0%</span><span>100%</span></div></div></div></div><div class="panel glow-border" style="animation-delay:0.52s"><div class="panel-header"><div class="section-title"><span class="section-dot" style="background:#60a5fa;box-shadow:0 0 8px #60a5fa"></span>قائمة المدعوين</div><span class="count-badge">${confirmed} مؤكد</span></div><div class="search-wrap"><div class="search-box"><span style="font-size:13px;opacity:0.6">🔍</span><input id="searchInput" placeholder="ابحث بالاسم أو المنصب..." oninput="renderList()"></div></div><div class="filters" id="filterBtns"></div><div class="guest-list" id="guestList"></div><div class="list-footer" id="listFooter"></div></div><div class="last-updated">آخر تحديث: ${now} · ${total} مدعو</div>`;
const KPI=[{label:"إجمالي المدعوين",value:total,sub:CATS.length+" فئات",color:"#e2c4ff",icon:"👥"},{label:"مؤكد الحضور",value:confirmed,sub:pct+"% من الإجمالي",color:"#86efac",icon:"✅"},{label:"في الانتظار",value:pending,sub:"لم يتأكد بعد",color:"#c4b5fd",icon:"⏳"},{label:"معتذر",value:excused,sub:"اعتذر عن الحضور",color:"#fca5a5",icon:"✗"},{label:"نسبة التأكيد",value:pct+"%",sub:"الهدف: 100%",color:"#f0abfc",icon:"📊"}];
const kpiGrid=document.getElementById("kpiGrid");
KPI.forEach((k,i)=>{const div=document.createElement("div");div.className="kpi-card glow-border"+(i===4?" kpi-full":"");div.style.animationDelay=(i*0.07)+"s";div.innerHTML=`<div class="kpi-accent" style="background:${k.color}"></div><div class="kpi-label">${k.label}</div><div class="kpi-value" style="color:${k.color}">${k.value}</div><div class="kpi-sub">${k.sub}</div><div class="kpi-icon">${k.icon}</div>`;kpiGrid.appendChild(div);});
const R=52,CX=68,CY=68,CIRC=2*Math.PI*R;let off=0;
const svg=document.getElementById("donutSvg");
CATS.forEach(cat=>{if(!catTotals[cat])return;const dash=(catTotals[cat]/total)*CIRC;const c=document.createElementNS("http://www.w3.org/2000/svg","circle");c.setAttribute("cx",CX);c.setAttribute("cy",CY);c.setAttribute("r",R);c.setAttribute("fill","none");c.setAttribute("stroke",COLORS[cat].bar);c.setAttribute("stroke-width","17");c.setAttribute("stroke-dasharray",`${dash-1.5} ${CIRC-(dash-1.5)}`);c.setAttribute("stroke-dashoffset",-off);c.setAttribute("stroke-linecap","round");c.style.transform=`rotate(-90deg)`;c.style.transformOrigin=`${CX}px ${CY}px`;svg.appendChild(c);off+=dash+1.5;});
const t1=document.createElementNS("http://www.w3.org/2000/svg","text");t1.setAttribute("x",CX);t1.setAttribute("y",CY-8);t1.setAttribute("text-anchor","middle");t1.setAttribute("font-family","Cairo,sans-serif");t1.setAttribute("font-size","27");t1.setAttribute("font-weight","800");t1.setAttribute("fill","white");t1.textContent=total;svg.appendChild(t1);
const t2=document.createElementNS("http://www.w3.org/2000/svg","text");t2.setAttribute("x",CX);t2.setAttribute("y",CY+10);t2.setAttribute("text-anchor","middle");t2.setAttribute("font-family","Tajawal,sans-serif");t2.setAttribute("font-size","10");t2.setAttribute("fill","rgba(196,181,253,0.6)");t2.textContent="مدعو";svg.appendChild(t2);
const legend=document.getElementById("legend");
CATS.forEach(cat=>{legend.innerHTML+=`<div class="legend-item"><div class="legend-left"><div class="legend-dot" style="background:${COLORS[cat].bar};box-shadow:0 0 6px ${COLORS[cat].bar}"></div><span class="legend-name">${cat}</span></div><span class="legend-val" style="color:${COLORS[cat].text}">${catTotals[cat]}</span></div>`;});
const barList=document.getElementById("barList");
CATS.forEach(cat=>{const c=catConfirmed[cat],t=catTotals[cat];if(!t)return;const pctCat=((c/t)*100).toFixed(0);barList.innerHTML+=`<div><div class="bar-row"><span class="bar-name">${cat}</span><span class="bar-val" style="color:${COLORS[cat].text}">${c} / ${t}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pctCat}%;background:linear-gradient(90deg,${COLORS[cat].bar}55,${COLORS[cat].bar});box-shadow:0 0 8px ${COLORS[cat].bar}66"></div></div></div>`;});
const FILTERS=[{key:"all",label:"الكل ("+total+")"},{key:"confirmed",label:"✓ مؤكد ("+confirmed+")"},{key:"pending",label:"⏳ انتظار ("+pending+")"},{key:"excused",label:"✗ معتذر ("+excused+")"}];
const filterBtns=document.getElementById("filterBtns");
FILTERS.forEach(f=>{const btn=document.createElement("button");btn.className="filter-btn"+(f.key==="all"?" active":"");btn.textContent=f.label;btn.onclick=()=>{currentFilter=f.key;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderList();};filterBtns.appendChild(btn);});
renderList();
}
function renderList(){
const search=(document.getElementById("searchInput")||{}).value||"";
const filtered=guests.filter(g=>{const matchF=currentFilter==="all"||g.status===currentFilter;const matchS=!search||g.name.includes(search)||g.title.includes(search)||g.cat.includes(search);return matchF&&matchS;});
const list=document.getElementById("guestList");
if(!list)return;
if(filtered.length===0){list.innerHTML='<div class="empty">لا توجد نتائج</div>';return;}
list.innerHTML=filtered.map(g=>{const ss=STATUS[g.status];const cc=COLORS[g.cat];return`<div class="guest-item"><div style="flex:1;min-width:0"><div class="guest-name">${g.name}</div><div class="guest-title">${g.title}</div></div><div class="guest-right"><span class="cat-tag" style="background:rgba(255,255,255,0.06);color:${cc.text};border:1px solid ${cc.bar}33">${g.cat}</span><span class="status-tag" style="background:${ss.bg};color:${ss.text};border:1px solid ${ss.border}">${ss.label}</span></div></div>`;}).join("");

if(footer)footer.textContent="عرض "+filtered.length+" من "+guests.length+" مدعو";
}
loadData();
